  <g transform="translate(700,110)">
    <rect x="0" y="0" width="200" height="90" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="20" y="30" fill="white" font-size="11" opacity="0.6" font-weight="600">RATE CALCULATOR</text>
    <text x="20" y="62" fill="white" font-size="30" font-weight="800">$95<tspan font-size="16" opacity="0.8">/hr</tspan></text>
    <text x="20" y="82" fill="white" font-size="11" opacity="0.55">Your minimum viable rate</text>
    <rect x="220" y="0" width="200" height="90" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="240" y="30" fill="white" font-size="11" opacity="0.6" font-weight="600">PROJECT COST</text>
    <text x="240" y="62" fill="white" font-size="30" font-weight="800">$4,200</text>
    <text x="240" y="82" fill="white" font-size="11" opacity="0.55">With scope buffer</text>
    <rect x="0" y="110" width="200" height="90" rx="14" fill="white" fill-opacity="0.14" stroke="white" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="20" y="140" fill="white" font-size="11" opacity="0.6" font-weight="600">FIVERR FEES</text>
    <text x="20" y="172" fill="#a5b4fc" font-size="30" font-weight="800">−20%</text>
    <text x="20" y="192" fill="white" font-size="11" opacity="0.55">You keep $800 of $1,000</text>
    <rect x="220" y="110" width="200" height="90" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="240" y="140" fill="white" font-size="11" opacity="0.6" font-weight="600">UPWORK FEES</text>
    <text x="240" y="172" fill="#86efac" font-size="30" font-weight="800">−10%</text>
    <text x="240" y="192" fill="white" font-size="11" opacity="0.55">You keep $900 of $1,000</text>
    <rect x="0" y="220" width="420" height="60" rx="14" fill="white" fill-opacity="0.08"/>
    <text x="210" y="248" text-anchor="middle" fill="white" font-size="13" opacity="0.65">Invoice · Proposal · Contract · Tax · Retainer</text>
    <text x="210" y="268" text-anchor="middle" fill="white" font-size="13" opacity="0.65">Scope of Work · Late Fees · Working Days &amp; more</text>
    <rect x="0" y="300" width="420" height="50" rx="12" fill="#4f46e5" stroke="#a5b4fc" stroke-width="1.5"/>
    <text x="210" y="331" text-anchor="middle" fill="white" font-size="15" font-weight="700">freeltools.com — All tools free, always</text>
