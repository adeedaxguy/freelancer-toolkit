<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.07"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- grid -->
  <g opacity="0.07" stroke="white" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/><line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/><line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="960" y1="0" x2="960" y2="630"/>
  </g>
  <!-- decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="white" opacity="0.03"/>
  <circle cx="150" cy="560" r="160" fill="white" opacity="0.03"/>
  <!-- badge -->
  <rect x="80" y="76" width="196" height="34" rx="17" fill="white" opacity="0.18"/>
  <text x="178" y="99" text-anchor="middle" fill="white" font-size="14" font-weight="600">freeltools.com</text>
  <!-- free pill -->
  <rect x="80" y="128" width="72" height="28" rx="14" fill="#86efac" fill-opacity="0.9"/>
  <text x="116" y="147" text-anchor="middle" fill="#14532d" font-size="13" font-weight="700">FREE</text>
  <!-- headline -->
  <text x="80" y="230" fill="white" font-size="58" font-weight="800" letter-spacing="-1.5">Free Tools for</text>
  <text x="80" y="300" fill="white" font-size="58" font-weight="800" letter-spacing="-1.5">Freelancers</text>
  <rect x="80" y="320" width="140" height="5" rx="2.5" fill="#a5b4fc"/>
  <text x="80" y="374" fill="white" font-size="22" opacity="0.82">Calculators &amp; generators. No login. No fees.</text>
  <!-- stats row -->
  <rect x="80" y="430" width="160" height="80" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="160" y="466" text-anchor="middle" fill="white" font-size="32" font-weight="800">31</text>
  <text x="160" y="492" text-anchor="middle" fill="white" font-size="13" opacity="0.7">Free Tools</text>
  <rect x="260" y="430" width="160" height="80" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="340" y="466" text-anchor="middle" fill="white" font-size="32" font-weight="800">0</text>
  <text x="340" y="492" text-anchor="middle" fill="white" font-size="13" opacity="0.7">Login Required</text>
  <rect x="440" y="430" width="160" height="80" rx="14" fill="url(#card1)" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <text x="520" y="466" text-anchor="middle" fill="white" font-size="32" font-weight="800">100%</text>
  <text x="520" y="492" text-anchor="middle" fill="white" font-size="13" opacity="0.7">Free Forever</text>
