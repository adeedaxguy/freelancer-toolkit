<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid pattern -->
  <g opacity="0.08">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="white" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="white" stroke-width="1"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="980" cy="100" r="180" fill="white" opacity="0.04"/>
  <circle cx="980" cy="100" r="120" fill="white" opacity="0.05"/>
  <circle cx="220" cy="530" r="140" fill="white" opacity="0.04"/>

  <!-- Left content area -->
  <!-- Site badge -->
  <rect x="80" y="80" width="180" height="32" rx="16" fill="white" opacity="0.2"/>
  <text x="170" y="101" text-anchor="middle" fill="white" font-size="13" font-weight="600" opacity="0.95">freeltools.com</text>

  <!-- Main headline -->
  <text x="80" y="190" fill="white" font-size="52" font-weight="800" letter-spacing="-1">How to Price Your</text>
  <text x="80" y="255" fill="white" font-size="52" font-weight="800" letter-spacing="-1">Freelance Services</text>

  <!-- Accent line -->
  <rect x="80" y="278" width="120" height="5" rx="2.5" fill="#a5b4fc"/>

  <!-- Subtitle -->
  <text x="80" y="330" fill="white" font-size="22" opacity="0.85">The complete guide to freelance pricing —</text>
  <text x="80" y="360" fill="white" font-size="22" opacity="0.85">rates, models, fees, and strategy.</text>

  <!-- Tags -->
  <rect x="80" y="400" width="120" height="30" rx="15" fill="white" opacity="0.2"/>
  <text x="140" y="420" text-anchor="middle" fill="white" font-size="13" font-weight="500">Pricing</text>

  <rect x="214" y="400" width="140" height="30" rx="15" fill="white" opacity="0.2"/>
  <text x="284" y="420" text-anchor="middle" fill="white" font-size="13" font-weight="500">Freelancing</text>

  <rect x="368" y="400" width="120" height="30" rx="15" fill="white" opacity="0.2"/>
  <text x="428" y="420" text-anchor="middle" fill="white" font-size="13" font-weight="500">Business</text>

  <!-- Reading time -->
  <text x="80" y="490" fill="white" font-size="14" opacity="0.6">12 min read  ·  2,400+ words  ·  FreelancerToolkit</text>

  <!-- Right side — pricing cards -->
  <g transform="translate(680, 80)" filter="url(#shadow)">
    <!-- Card 1: Hourly -->
    <rect x="0" y="0" width="220" height="110" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="20" y="32" fill="white" font-size="11" font-weight="600" opacity="0.7" text-transform="uppercase" letter-spacing="1">HOURLY RATE</text>
    <text x="20" y="68" fill="white" font-size="38" font-weight="800">$75<tspan font-size="18" opacity="0.7">/hr</tspan></text>
    <text x="20" y="95" fill="white" font-size="12" opacity="0.6">Min. viable rate for most freelancers</text>

    <!-- Card 2: Project -->
    <rect x="240" y="0" width="220" height="110" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="260" y="32" fill="white" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1">PROJECT PRICE</text>
    <text x="260" y="68" fill="white" font-size="38" font-weight="800">$3,500</text>
    <text x="260" y="95" fill="white" font-size="12" opacity="0.6">Fixed-price with scope buffer</text>

    <!-- Card 3: Retainer -->
    <rect x="0" y="130" width="220" height="110" rx="16" fill="white" fill-opacity="0.15" stroke="white" stroke-opacity="0.3" stroke-width="1.5"/>
    <text x="20" y="162" fill="white" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1">RETAINER</text>
    <text x="20" y="198" fill="#a5b4fc" font-size="38" font-weight="800">$2,000<tspan font-size="18" opacity="0.9">/mo</tspan></text>
    <text x="20" y="225" fill="white" font-size="12" opacity="0.6">Predictable recurring income</text>

    <!-- Card 4: Value-based -->
    <rect x="240" y="130" width="220" height="110" rx="16" fill="url(#card)" stroke="white" stroke-opacity="0.2" stroke-width="1"/>
    <text x="260" y="162" fill="white" font-size="11" font-weight="600" opacity="0.7" letter-spacing="1">VALUE-BASED</text>
    <text x="260" y="198" fill="white" font-size="38" font-weight="800">$15k+</text>
    <text x="260" y="225" fill="white" font-size="12" opacity="0.6">Priced on client ROI, not hours</text>

    <!-- Fee pill -->
    <rect x="0" y="270" width="460" height="56" rx="14" fill="white" fill-opacity="0.1" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
    <text x="230" y="296" text-anchor="middle" fill="white" font-size="13" opacity="0.7">Platform fees cut into earnings:</text>
    <text x="100" y="318" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="700">Fiverr −20%</text>
    <text x="230" y="318" text-anchor="middle" fill="#a5b4fc" font-size="15" font-weight="700">Upwork −10%</text>
    <text x="360" y="318" text-anchor="middle" fill="#86efac" font-size="15" font-weight="700">Direct −0%</text>

    <!-- Formula box -->
    <rect x="0" y="350" width="460" height="60" rx="14" fill="white" fill-opacity="0.08"/>
    <text x="230" y="376" text-anchor="middle" fill="white" font-size="12" opacity="0.6">Your minimum rate formula:</text>
    <text x="230" y="400" text-anchor="middle" fill="white" font-size="14" font-weight="700">(Income Goal + Taxes + Expenses) ÷ Billable Hours</text>
  </g>
</svg>
